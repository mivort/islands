<aside class="flex column">
  <div class="flex column pad">
    <label for="side-edit-label">Label</label>
    <textarea id="side-edit-label" disabled></textarea>
    <label for="side-edit-ref">Reference</label>
    <input type="text" id="side-edit-ref" disabled />
    <label for="side-edit-note">Note</label>
    <textarea id="side-edit-note" disabled></textarea>
  </div>
  <div id="side-view-doc" class="pad expand"></div>
  <div class="flex column pad gap">
    <div class="flex row gap" id="side-view-location">
      <svg class="icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <title>Location</title>
        <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" fill="currentColor"/>
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2.08296 7C2.50448 4.48749 4.48749 2.50448 7 2.08296V0H9V2.08296C11.5125 2.50448 13.4955 4.48749 13.917 7H16V9H13.917C13.4955 11.5125 11.5125 13.4955 9 13.917V16H7V13.917C4.48749 13.4955 2.50448 11.5125 2.08296 9H0V7H2.08296ZM4 8C4 5.79086 5.79086 4 8 4C10.2091 4 12 5.79086 12 8C12 10.2091 10.2091 12 8 12C5.79086 12 4 10.2091 4 8Z" fill="currentColor"/>
      </svg>
      <div id="side-view-location-value" class="nowrap ellipsis"></div>
      <button id="side-view-location-copy" title="Copy location">
        <svg class="icon" width="800px" height="800px" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0H10V4H4V10H0V0Z" fill="currentColor"/>
          <path d="M16 6H6V16H16V6Z" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="flex row gap">
      <label for="side-edit-shape">Shape</label>
      <select id="side-edit-shape" class="expand">
        <option selected value>default</option>
        <option value="ellipse">ellipse</option>
        <option value="triangle">triangle</option>
        <option value="round-triangle">round-triangle</option>
        <option value="rectangle">rectangle</option>
        <option value="round-rectangle">round-rectangle</option>
        <option value="bottom-round-rectangle">bottom-round-rectangle</option>
        <option value="cut-rectangle">cut-rectangle</option>
        <option value="barrel">barrel</option>
        <option value="rhomboid">rhomboid</option>
        <option value="right-rhomboid">right-rhomboid</option>
        <option value="diamond">diamond</option>
        <option value="round-diamond">round-diamond</option>
        <option value="pentagon">pentagon</option>
        <option value="round-pentagon">round-pentagon</option>
        <option value="hexagon">hexagon</option>
        <option value="round-hexagon">round-hexagon</option>
        <option value="concave-hexagon">concave-hexagon</option>
        <option value="heptagon">heptagon</option>
        <option value="round-heptagon">round-heptagon</option>
        <option value="octagon">octagon</option>
        <option value="round-octagon">round-octagon</option>
        <option value="star">star</option>
        <option value="tag">tag</option>
        <option value="round-tag">round-tag</option>
        <option value="vee">vee</option>
      </select>
    </div>
    <div class="flex row gap">
      <label for="side-edit-size">Size</label>
      <input type="number" class="expand" id="side-edit-size" value="25" min="5" max="100" step="5" />
    </div>
    <div class="flex row gap">
      <div>
        <input type="checkbox" id="side-edit-class-fade" disabled />
        <label for="side-edit-class-fade">Fade</label>
      </div>
      <div>
        <input type="checkbox" id="side-edit-class-draft" disabled />
        <label for="side-edit-class-draft">Draft</label>
      </div>
      <div>
        <input type="checkbox" id="side-edit-class-comment" disabled />
        <label for="side-edit-class-comment">Comment</label>
      </div>
    </div>
    <div class="flex row gap">
      <div class="expand">ID:</div>
      <div id="side-edit-id" class="nowrap ellipsis"></div>
    </div>
  </div>
  <input class="pad" id="side-file-picker" type="file" accept=".json,.csv" multiple />
  <div class="flex row pad">
    <button id="side-fit-button">Fit</button>
    <button id="side-fit-sel-button">Sel</button>
    <button id="side-undo-button">Undo</button>
    <button id="side-redo-button">Redo</button>
    <button id="side-export-button">Export</button>
  </div>
</aside>
